# ============================================================
# US Stock Trading Bot - メイン設定ファイル
# ============================================================
# このファイルはBotの動作を制御するすべての設定を管理します
# 秘匿情報（APIキー等）は .env ファイルに記述してください

# -----------------------------------------------------------
# 資金・ポートフォリオ設定
# -----------------------------------------------------------
portfolio:
  initial_capital_jpy: 500000        # 初期資金（円）
  base_currency: "USD"               # 取引通貨
  max_positions: 3                   # 同時保有最大ポジション数（スイング特化）
  max_position_pct: 0.10             # 1銘柄の最大投資比率（30%→10%に縮小）
  risk_per_trade_pct: 0.005          # 1取引あたりリスク上限（2%→0.5%に縮小）
  daily_loss_limit_pct: 0.05         # 日次損失上限（5%でBot停止）
  weekly_loss_limit_pct: 0.10        # 週次損失上限（10%）
  drawdown_pause_pct: 0.15           # ドローダウン15%でBotを一時停止
  # PDTルール保護（$25K未満口座：週3回までデイトレ可）
  pdt_protection: true               # PDT保護を有効化
  pdt_max_day_trades_per_week: 0     # 実口座ではデイトレ禁止（0=完全無効）

# -----------------------------------------------------------
# テスタ哲学コアルール
# テスタ氏の「負けないことを最優先」原則を実装
# -----------------------------------------------------------
testa_rules:
  # 損切りルール（最重要）
  stop_loss:
    default_pct: 0.02               # デフォルト損切り幅（2%）
    max_pct: 0.03                   # 最大損切り幅（3%）
    atr_multiplier: 1.5             # ATRベース損切りの乗数

  # 利確ルール
  take_profit:
    min_rr_ratio: 2.0               # 最小リスクリワード比（1:2）
    trailing_stop_pct: 0.015        # トレーリングストップ幅（1.5%）

  # エントリー条件
  entry:
    min_volume_ratio: 1.5           # 平均出来高比（1.5倍以上で取引）
    min_daily_volume: 1000000       # 最低日次出来高（1,000,000株）
    min_price: 5.0                  # 最低株価（$5以上）
    max_spread_pct: 0.005           # 最大スプレッド（0.5%以下）

  # 市場環境フィルター
  market_filter:
    vix_max: 35                     # VIX 35以下でのみ取引
    vix_caution: 25                 # VIX 25以上は取引量を半減
    market_trend_required: true     # 市場トレンド方向への取引のみ

# -----------------------------------------------------------
# デイトレ戦略設定
# -----------------------------------------------------------
day_trade:
  enabled: false   # 実口座$3,300ではPDTルール抵触のため無効化
  # VWAPバウンス戦略
  vwap_bounce:
    enabled: true
    deviation_entry: 0.005          # VWAPから0.5%乖離でエントリー
    min_volume_spike: 1.3           # 出来高スパイク倍率（2.0→1.3に緩和）
    max_hold_minutes: 120           # 最大保有時間（分）

  # 寄り付き値幅ブレイクアウト（Opening Range Breakout）
  orb:
    enabled: true
    range_minutes: 15               # 最初15分で値幅を確定
    breakout_buffer_pct: 0.002      # ブレイクアウト確認バッファ

  # モメンタム戦略
  momentum:
    enabled: true
    lookback_minutes: 30            # モメンタム計算期間
    min_momentum_pct: 0.015         # 最小モメンタム（1.5%）

  # 取引時間制限（米国東部時間）
  trading_hours:
    start: "09:35"                  # マーケットオープン5分後から
    end: "15:45"                    # クローズ15分前まで
    avoid_lunch: true               # ランチタイム（11:30-13:00）を避ける

# -----------------------------------------------------------
# スイングトレード戦略設定
# -----------------------------------------------------------
swing_trade:
  enabled: true
  hold_days_max: 10                 # 最大保有日数

  # MA クロスオーバー戦略
  ma_crossover:
    enabled: true
    fast_ma: 20                     # 短期MA（20日EMA）
    slow_ma: 50                     # 長期MA（50日EMA）
    trend_ma: 200                   # トレンド判定MA（200日SMA）

  # ブレイクアウト戦略
  breakout:
    enabled: true
    lookback_days: 20               # 高値抵抗ラインの参照期間
    volume_confirm_ratio: 1.5       # 出来高確認倍率

  # RSI 平均回帰戦略
  rsi_reversion:
    enabled: true
    oversold_level: 40              # 売られ過ぎ水準（30→40に緩和：強気相場対応）
    overbought_level: 70            # 買われ過ぎ水準
    rsi_period: 14                  # RSI計算期間

  # EMA押し目買い戦略（SwingPullback）
  # ※ 2025/05 停止: 損切りがATR内に収まらず構造的欠陥あり → 直ちに無効化
  ema_pullback:
    enabled: false
    pullback_to_ema: 20             # 引き付けるEMA（20日）
    max_distance_pct: 0.02          # EMAから最大2%以内まで押した時にエントリー
    min_rsi: 35                     # RSI下限（行き過ぎた売られ過ぎは回避）
    max_rsi: 55                     # RSI上限（まだ上昇余地がある水準）

# -----------------------------------------------------------
# 対象銘柄ユニバース
# -----------------------------------------------------------
universe:
  # メイン対象（流動性最重視）
  primary:
    - "SPY"   # S&P500 ETF（市場全体の把握）
    - "QQQ"   # NASDAQ100 ETF
    - "AAPL"  # Apple
    - "MSFT"  # Microsoft
    - "NVDA"  # NVIDIA
    - "AMZN"  # Amazon
    - "META"  # Meta
    - "GOOGL" # Alphabet
    - "TSLA"  # Tesla
    - "AMD"   # AMD

  # セクターETF（市場全体把握用）
  sector_etfs:
    - "XLK"   # Technology
    - "XLF"   # Financials
    - "XLE"   # Energy
    - "XLV"   # Healthcare

  # 市場指標（取引対象外・分析用）
  market_indicators:
    - "^VIX"  # 恐怖指数
    - "^TNX"  # 10年国債利回り
    - "DXY"   # ドルインデックス

# -----------------------------------------------------------
# IBKR 接続設定
# -----------------------------------------------------------
ibkr:
  host: "127.0.0.1"
  port: 7497                        # TWS: 7496（本番）/ 7497（ペーパートレード）
  client_id: 1
  paper_trading: true               # 最初は必ずペーパートレードで開始
  account_type: "CASH"              # CASH（現物）/ MARGIN（信用）
  timeout: 10
  readonly: false

# -----------------------------------------------------------
# 通知設定
# -----------------------------------------------------------
notifications:
  line:
    enabled: true
    send_trade_alerts: true         # 取引都度通知
    send_daily_report: true         # 日次レポート通知
    report_time_jst: "08:00"        # 米国市場クローズ後の日本時間

  # 緊急アラート条件
  alerts:
    daily_loss_alert: true          # 日次損失上限アラート
    drawdown_alert: true            # ドローダウンアラート
    connection_lost: true           # IBKR接続断アラート

# -----------------------------------------------------------
# バックテスト設定
# -----------------------------------------------------------
backtest:
  start_date: "2022-01-01"         # バックテスト開始日
  end_date: "2024-12-31"           # バックテスト終了日
  initial_capital: 3300             # 初期資金（USD換算）
  commission_per_share: 0.005       # IBKR手数料（$/株）
  slippage_pct: 0.001              # スリッページ想定（0.1%）
  min_trades_for_valid: 30          # 有効と判断する最低取引回数

# -----------------------------------------------------------
# AI戦略最適化設定（Anthropic Claude API使用）
# -----------------------------------------------------------
ai_optimizer:
  enabled: true
  review_frequency: "weekly"        # 戦略レビュー頻度
  min_trades_for_review: 20         # レビューに必要な最低取引数
  auto_adjust: false                # 自動調整（trueは要注意）
  model: "claude-opus-4-7"         # 使用するClaudeモデル

# -----------------------------------------------------------
# ロギング設定
# -----------------------------------------------------------
logging:
  level: "INFO"                     # DEBUG / INFO / WARNING / ERROR
  file: "logs/bot.log"
  rotation: "1 day"
  retention: "30 days"
  format: "{time:YYYY-MM-DD HH:mm:ss} | {level} | {message}"
